name: CodeQL

# CodeQL static analysis for C++ source. Runs on push/PR to main and on
# a weekly schedule so the alerts stay fresh even when no commits land.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Sunday 06:30 UTC
    - cron: '30 6 * * 0'

jobs:
  analyze:
    name: Analyze C++
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y g++ make

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: c-cpp
          build-mode: manual
          queries: security-extended
          # Skip the vendored Fathom Syzygy probe library (BSD-licensed,
          # upstream at basil00/Fathom). We don't maintain that code and
          # diverging from upstream to silence CodeQL warnings would make
          # future upstream pulls painful.
          config: |
            paths-ignore:
              - 'src/fathom/**'

      - name: Build for CodeQL
        run: make build ARCH=x86-64-avx2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:c-cpp"
